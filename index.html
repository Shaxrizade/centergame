<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Daler's Game Center: Mario Edition</title>
    <style>
        :root { --bg: #121212; --gold: #f1c40f; --green: #2ecc71; --blue: #3498db; --red: #e74c3c; --purple: #9b59b6; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        #main-menu { text-align: center; }
        .menu-btn { padding: 15px 40px; font-size: 1.2rem; margin: 10px; cursor: pointer; border: none; border-radius: 12px; color: white; width: 280px; transition: 0.3s; font-weight: bold; display: block; }
        .btn-chess { background: var(--gold); color: black; }
        .btn-snake { background: var(--green); }
        .btn-tennis { background: var(--blue); }
        .btn-tetris { background: var(--purple); }
        .menu-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .hidden { display: none !important; }
        #game-container { display: flex; flex-direction: column; align-items: center; position: relative; }
        canvas { background: #000; border: 4px solid #333; border-radius: 8px; transition: 0.1s; }
        
        .shake { animation: shake 0.4s; border-color: var(--red) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        .game-over-text { position: absolute; top: 40%; font-size: 3.5rem; color: var(--red); font-weight: bold; text-shadow: 2px 2px 10px black; z-index: 10; animation: zoomIn 0.5s forwards; pointer-events: none; }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1.2); opacity: 1; } }

        .status-text { font-size: 1.5rem; margin-bottom: 10px; color: var(--gold); font-weight: bold; }
        .back-btn { margin-top: 20px; padding: 10px 20px; background: #c0392b; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1>🎮 GAME CENTER</h1>
        <button class="menu-btn btn-chess" onclick="startChess()">♟️ SHAXMAT</button>
        <button class="menu-btn btn-snake" onclick="startSnake()">🐍 ILONCHA</button>
        <button class="menu-btn btn-tennis" onclick="startTennis()">🏓 TENNIS</button>
        <button class="menu-btn btn-tetris" onclick="startTetris()">🧱 TETRIS</button>
    </div>

    <div id="game-container" class="hidden">
        <div id="status-text" class="status-text"></div>
        <div id="game-area"></div>
        <button class="back-btn" onclick="exitToMenu()">🏠 ASOSIY MENYU</button>
    </div>

<script>
    let activeInterval = null;
    let audioCtx = null;
    const gameArea = document.getElementById('game-area');
    const statusText = document.getElementById('status-text');

    // AudioContextni faqat foydalanuvchi bosganda ishga tushiramiz (Brauzer talabi)
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(freq, type, duration, vol = 0.1) {
        initAudio();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- MARIO GAME OVER OVOZI ---
    function playMarioGameOver() {
        initAudio();
        const now = audioCtx.currentTime;
        const notes = [392, 329, 261, 196, 164, 130]; // Pasayib boruvchi notalar
        notes.forEach((freq, i) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, now + i * 0.15);
            gain.gain.setValueAtTime(0.1, now + i * 0.15);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.15 + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + i * 0.15);
            osc.stop(now + i * 0.15 + 0.4);
        });
    }

    function triggerGameOver() {
        playMarioGameOver(); 
        const canvas = document.querySelector('canvas') || document.getElementById('chess-board');
        canvas.classList.add('shake');
        const goText = document.createElement('div');
        goText.className = 'game-over-text';
        goText.innerText = 'GAME OVER';
        document.getElementById('game-container').appendChild(goText);
        
        setTimeout(() => {
            goText.remove();
            canvas.classList.remove('shake');
            exitToMenu();
        }, 2000);
    }

    function exitToMenu() {
        if(activeInterval) { 
            cancelAnimationFrame(activeInterval); 
            clearInterval(activeInterval); 
            activeInterval = null; 
        }
        document.onkeydown = null;
        document.getElementById('game-container').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
        gameArea.innerHTML = '';
    }

    // ================= 1. ILONCHA =================
    function startSnake() {
        initAudio();
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        gameArea.innerHTML = '<canvas id="snakeCanvas" width="400" height="400"></canvas>';
        const ctx = document.getElementById('snakeCanvas').getContext('2d');
        let snake = [{x:10, y:10}], food = {x:15, y:15}, dx=0, dy=0, score=0;
        statusText.innerText = "Ball: 0";
        document.onkeydown = (e) => {
            if(e.key==='ArrowUp' && dy===0){dx=0; dy=-1}
            else if(e.key==='ArrowDown' && dy===0){dx=0; dy=1}
            else if(e.key==='ArrowLeft' && dx===0){dx=-1; dy=0}
            else if(e.key==='ArrowRight' && dx===0){dx=1; dy=0}
        };
        activeInterval = setInterval(() => {
            if(dx===0 && dy===0) return;
            let head = {x: snake[0].x+dx, y: snake[0].y+dy};
            if(head.x<0 || head.x>19 || head.y<0 || head.y>19 || snake.some(s=>s.x===head.x && s.y===head.y)) {
                clearInterval(activeInterval); triggerGameOver(); return;
            }
            snake.unshift(head);
            if(head.x===food.x && head.y===food.y) {
                score++; statusText.innerText="Ball: "+score;
                playSound(523, 'sine', 0.1); // "Ding" ovozi
                food={x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
            } else snake.pop();
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,400,400);
            ctx.fillStyle = '#2ecc71'; snake.forEach(s=>ctx.fillRect(s.x*20, s.y*20, 18, 18));
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(food.x*20, food.y*20, 18, 18);
        }, 120);
    }

    // ================= 2. TENNIS =================
    function startTennis() {
        initAudio();
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        gameArea.innerHTML = '<canvas id="tennisCanvas" width="600" height="400"></canvas>';
        const ctx = document.getElementById('tennisCanvas').getContext('2d');
        let ball = {x:300, y:200, dx:4, dy:4}, p1=150, p2=150, p1Move=0;
        statusText.innerText = "Tennis (PgUp/Dn)";
        document.onkeydown = (e) => {
            if(e.key==='PageUp'||e.key==='ArrowUp'){p1Move=-10; e.preventDefault();}
            if(e.key==='PageDown'||e.key==='ArrowDown'){p1Move=10; e.preventDefault();}
        };
        document.onkeyup = () => p1Move=0;
        function updateTennis() {
            p1 += p1Move; p1=Math.max(0, Math.min(300, p1));
            ball.x+=ball.dx; ball.y+=ball.dy;
            if(ball.y<0 || ball.y>390) { ball.dy*=-1; playSound(300, 'sine', 0.05); }
            p2 += (ball.y - (p2+50)) * 0.12;
            if((ball.x<25 && ball.y>p1 && ball.y<p1+100) || (ball.x>570 && ball.y>p2 && ball.y<p2+100)) {
                ball.dx*=-1.1; playSound(440, 'square', 0.1); 
            }
            if(ball.x<0 || ball.x>600) { cancelAnimationFrame(activeInterval); triggerGameOver(); return; }
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,600,400);
            ctx.fillStyle = '#3498db'; ctx.fillRect(10,p1,15,100);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(575,p2,15,100);
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(ball.x,ball.y,8,0,Math.PI*2); ctx.fill();
            activeInterval = requestAnimationFrame(updateTennis);
        }
        updateTennis();
    }

    // ================= 3. TETRIS =================
    function startTetris() {
        initAudio();
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        gameArea.innerHTML = '<canvas id="tetrisCanvas" width="240" height="400"></canvas>';
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');
        ctx.scale(20, 20);
        statusText.innerText = "Tetris | Ball: 0";
        const pieces = 'ILJOTSZ';
        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
        const arena = Array.from({length: 20}, () => Array(12).fill(0));
        let player = { pos: {x: 5, y: 0}, matrix: null, score: 0 };

        function resetPiece() {
            player.matrix = createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
            player.pos.y = 0; player.pos.x = 5;
            if (collide()) { cancelAnimationFrame(activeInterval); triggerGameOver(); }
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'T') return [[0,5,0],[5,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
        }

        function collide() {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
            return false;
        }

        function arenaSweep() {
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) if (arena[y][x] === 0) continue outer;
                arena.splice(y, 1); arena.unshift(new Array(12).fill(0));
                player.score += 10; statusText.innerText = "Tetris | Ball: " + player.score;
                playSound(880, 'sine', 0.2); 
            }
        }

        document.onkeydown = e => {
            if (e.key === 'ArrowLeft') { player.pos.x--; if(collide()) player.pos.x++; }
            if (e.key === 'ArrowRight') { player.pos.x++; if(collide()) player.pos.x--; }
            if (e.key === 'ArrowDown') drop();
            if (e.key === 'ArrowUp') {
                const m = player.matrix;
                for(let y=0; y<m.length; ++y) for(let x=0; x<y; ++x) [m[x][y],m[y][x]]=[m[y][x],m[x][y]];
                m.forEach(row => row.reverse());
                if(collide()) { m.forEach(row => row.reverse()); }
            }
        };

        function drop() {
            player.pos.y++;
            if (collide()) {
                player.pos.y--; 
                player.matrix.forEach((row, y) => row.forEach((val, x) => { if(val!==0) arena[y+player.pos.y][x+player.pos.x]=val; }));
                playSound(220, 'triangle', 0.1); 
                resetPiece(); arenaSweep();
            }
            dropCounter = 0;
        }

        let dropCounter = 0, lastTime = 0;
        function update(time = 0) {
            const deltaTime = time - lastTime; lastTime = time; dropCounter += deltaTime;
            if (dropCounter > 1000) drop();
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            arena.forEach((row, y) => row.forEach((v, x) => { if(v!==0){ ctx.fillStyle=colors[v]; ctx.fillRect(x,y,1,1); } }));
            player.matrix.forEach((row, y) => row.forEach((v, x) => { if(v!==0){ ctx.fillStyle=colors[v]; ctx.fillRect(x+player.pos.x,y+player.pos.y,1,1); } }));
            activeInterval = requestAnimationFrame(update);
        }
        resetPiece(); update();
    }

    // ================= 4. SHAXMAT =================
    function startChess() {
        initAudio();
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        gameArea.innerHTML = '<div id="chess-board"></div>';
        const cb = document.getElementById('chess-board');
        let board = [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']];
        const pieces = {'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙'};
        let selected = null;
        function render() {
            cb.innerHTML = '';
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r+c)%2===0?'w-cell':'b-cell'}`;
                if(selected && selected.r===r && selected.c===c) cell.classList.add('selected');
                cell.innerHTML = pieces[board[r][c]] || '';
                cell.onclick = () => {
                    if(selected) {
                        board[r][c] = board[selected.r][selected.c]; board[selected.r][selected.c] = '';
                        selected = null; playSound(400, 'triangle', 0.1); render();
                    } else if(board[r][c]!=='') { selected = {r, c}; render(); }
                };
                cb.appendChild(cell);
            }
        }
        render();
    }
</script>
</body>
</html>
